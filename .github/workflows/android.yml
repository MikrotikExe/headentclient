name: Android build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      # mapovane zo secrets, aby sa dalo testovat v 'if' (secrets sa v if nedaju)
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '8.10'

      - name: Set up Android SDK (sdkmanager na PATH)
        uses: android-actions/setup-android@v3

      - name: Install Android NDK (pre natívne debug symboly libVLC)
        run: |
          sdkmanager "ndk;27.0.12077973"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "--- NDK obsah ---"; ls -la "$ANDROID_HOME/ndk" || true

      - name: Set up signing (z GitHub secrets)
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
          printf 'storeFile=keystore.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' "$KEYSTORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" > keystore.properties

      - name: Build debug APK
        run: gradle :androidApp:assembleDebug
      - name: Upload debug APK
        uses: actions/upload-artifact@v5
        with:
          name: HeadentClient-debug
          path: androidApp/build/outputs/apk/debug/*.apk

      - name: Build release APK (R8, na test na zariadeni)
        run: gradle :androidApp:assembleRelease
      - name: Upload release APK
        uses: actions/upload-artifact@v5
        with:
          name: HeadentClient-release
          path: androidApp/build/outputs/apk/release/*.apk

      - name: Build release AAB (pre Google Play)
        run: gradle :androidApp:bundleRelease
      - name: Upload AAB
        uses: actions/upload-artifact@v5
        with:
          name: HeadentClient-aab
          path: androidApp/build/outputs/bundle/release/*.aab

      - name: Overiť symboly v AAB
        if: always()
        run: |
          AAB=$(ls androidApp/build/outputs/bundle/release/*.aab 2>/dev/null | head -1)
          echo "AAB: $AAB"
          if [ -n "$AAB" ] && unzip -l "$AAB" | grep -qi "debugsymbols"; then
            echo "OK: debug symboly SU v AAB:"
            unzip -l "$AAB" | grep -i debugsymbols
          else
            echo "POZOR: v AAB NIE SU debug symboly."
            echo "Pouzi vygenerovany artefakt HeadentClient-native-symbols a nahraj ho v Play Console rucne."
          fi

      - name: Vygenerovať native-debug-symbols.zip (záloha, vždy)
        if: always()
        run: |
          OUT=$(find androidApp/build/intermediates -type d -path '*merged_native_libs/release*/out/lib' | head -1)
          if [ -z "$OUT" ]; then OUT=$(find androidApp/build/intermediates -type d -path '*stripped_native_libs/release*/out/lib' | head -1); fi
          echo "lib dir: $OUT"
          if [ -n "$OUT" ]; then
            ( cd "$OUT" && zip -r "$GITHUB_WORKSPACE/native-debug-symbols.zip" . -i '*.so' )
            echo "--- obsah zipu ---"; unzip -l "$GITHUB_WORKSPACE/native-debug-symbols.zip"
          else
            echo "Nenasiel som adresar s nativnymi kniznicami."
          fi
      - name: Upload native-debug-symbols
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: HeadentClient-native-symbols
          path: native-debug-symbols.zip
