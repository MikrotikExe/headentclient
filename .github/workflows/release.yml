name: Release (tag -> APK na GitHub Release)

# M402: pri pushnuti tagu v* CI zostavi PODPISANE release APK a publikuje
# GitHub Release s prilohou a sha256. Rucne spustenie: workflow_dispatch
# s nazvom existujuceho tagu (pre tagy pushnute pred pridanim workflowu).
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existujuci tag (napr. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      REL_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.REL_TAG }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '8.11.1'

      - name: Set up Android SDK (sdkmanager na PATH)
        uses: android-actions/setup-android@v3

      - name: Set up signing (z GitHub secrets)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Chyba KEYSTORE_BASE64 secret — release musi byt podpisany produkcnym klucom." >&2
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
          printf 'storeFile=keystore.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' "$KEYSTORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" > keystore.properties

      - name: Build release APK
        run: gradle :androidApp:assembleRelease

      - name: Priprav artefakty (nazov + sha256)
        run: |
          # M424: assembleRelease vyrobi viac APK (jeden na kazde ABI + univerzalny).
          # Predtym tu bolo "ls | head -1", co abecedne vybralo arm64 a zvysok zahodilo
          # -> na 32-bitovych zariadeniach sa vydanie nedalo nainstalovat.
          DIR=androidApp/build/outputs/apk/release
          VER="${REL_TAG#v}"
          ls -la "$DIR" || true
          FOUND=0
          for APK in "$DIR"/*.apk; do
            [ -e "$APK" ] || continue
            case "$APK" in *unsigned*) echo "APK je NEPODPISANE — skontroluj signing secrets" >&2; exit 1;; esac
            case "$(basename "$APK")" in
              *universal*)    OUT="HeadentClient-$VER.apk" ;;
              *arm64-v8a*)    OUT="HeadentClient-$VER-arm64-v8a.apk" ;;
              *armeabi-v7a*)  OUT="HeadentClient-$VER-armeabi-v7a.apk" ;;
              *)              OUT="HeadentClient-$VER.apk" ;;
            esac
            cp "$APK" "$OUT"
            sha256sum "$OUT" > "$OUT.sha256"
            echo "-> $OUT ($(du -h "$OUT" | cut -f1))"
            FOUND=$((FOUND+1))
          done
          if [ "$FOUND" -eq 0 ]; then echo "Release APK sa nenasiel" >&2; exit 1; fi
          # Poistka proti navratu tej istej chyby. Vydanie musi byt instalovatelne
          # na 32-bit aj 64-bit, co plati ked existuje bud univerzalny APK, alebo
          # oba splity. Druha moznost nastane pri rucnom spusteni nad starsou
          # znackou, ktorej build.gradle.kts univerzalny APK este nevyrabal.
          if [ ! -f "HeadentClient-$VER.apk" ] &&
             { [ ! -f "HeadentClient-$VER-arm64-v8a.apk" ] ||
               [ ! -f "HeadentClient-$VER-armeabi-v7a.apk" ]; }; then
            echo "Vydanie by pokrylo len jednu architekturu — zastavene" >&2
            exit 1
          fi
          cat HeadentClient-*.apk.sha256

      - name: Poznamky k vydaniu
        id: notes
        run: |
          if [ -f ".github/release-notes/${REL_TAG}.md" ]; then
            echo "path=.github/release-notes/${REL_TAG}.md" >> "$GITHUB_OUTPUT"
          else
            printf 'Headent Client %s\n' "${REL_TAG#v}" > /tmp/auto-notes.md
            echo "path=/tmp/auto-notes.md" >> "$GITHUB_OUTPUT"
          fi

      - name: Publikuj GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.REL_TAG }}
          name: Headent Client ${{ env.REL_TAG }}
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            HeadentClient-*.apk
            HeadentClient-*.apk.sha256
